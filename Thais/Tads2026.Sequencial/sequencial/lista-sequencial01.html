<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 01 | Estrutura Sequencial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="page-exercise">
    <main class="exercise-wrap">
        <article class="exercise-card">
            <h1 class="exercise-title">Lista 01 - Estrutura Sequencial</h1>
            <p class="exercise-desc">
                Clique em um exercício para executar. As entradas são feitas com <code>prompt</code> e o resultado aparece em alerta e abaixo.
            </p>

            <div class="exercise-actions">
                <button type="button" class="btn-exercise" onclick="exercicio01()">01 - Soma</button>
                <button type="button" class="btn-exercise" onclick="exercicio02()">02 - Antecessor e Sucessor</button>
                <button type="button" class="btn-exercise" onclick="exercicio03()">03 - Média do Semestre</button>
                <button type="button" class="btn-exercise" onclick="exercicio04()">04 - Conversor de Moedas</button>
                <button type="button" class="btn-exercise" onclick="exercicio05()">05 - Área do Terreno</button>
                <button type="button" class="btn-exercise" onclick="exercicio06()">06 - Celsius para Fahrenheit</button>
                <button type="button" class="btn-exercise" onclick="exercicio07()">07 - Desconto de 15%</button>
                <button type="button" class="btn-exercise" onclick="exercicio08()">08 - Conta do Restaurante</button>
                <button type="button" class="btn-exercise" onclick="exercicio09()">09 - Dias Vividos</button>
                <button type="button" class="btn-exercise" onclick="exercicio10()">10 - Salario do Dev</button>
            </div>

            <div id="resultado" class="exercise-result" role="status" aria-live="polite">
                <span class="exercise-placeholder">O resultado do ultimo exercicio aparecera aqui.</span>
            </div>
        </article>
    </main>

    <script src="lista-sequencial-01.js"></script>
</body>
</html>
