<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 03 | Repeticoes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="page-exercise">
    <main class="exercise-wrap">
        <article class="exercise-card">
            <h1 class="exercise-title">Lista 03 - Estrutura de Repeticao</h1>
            <p class="exercise-desc">Clique em um exercicio para executar.</p>
            <div class="exercise-actions">
                <button type="button" class="btn-exercise" onclick="exercicio01()">01 - Contagem regressiva</button>
                <button type="button" class="btn-exercise" onclick="exercicio02()">02 - Tabuada</button>
                <button type="button" class="btn-exercise" onclick="exercicio03()">03 - Soma ate N</button>
                <button type="button" class="btn-exercise" onclick="exercicio04()">04 - Pares 1 a 50</button>
                <button type="button" class="btn-exercise" onclick="exercicio05()">05 - Validacao de senha</button>
                <button type="button" class="btn-exercise" onclick="exercicio06()">06 - Fatorial</button>
                <button type="button" class="btn-exercise" onclick="exercicio07()">07 - Fibonacci</button>
                <button type="button" class="btn-exercise" onclick="exercicio08()">08 - Caixa registradora</button>
                <button type="button" class="btn-exercise" onclick="exercicio09()">09 - Maior e menor idade</button>
                <button type="button" class="btn-exercise" onclick="exercicio10()">10 - Jogo adivinhacao</button>
            </div>
            <div id="resultado" class="exercise-result" role="status" aria-live="polite">
                <span class="exercise-placeholder">Resultado do exercicio aparece aqui.</span>
            </div>
        </article>
    </main>
    <script src="lista-repeticao-03.js"></script>
</body>
</html>
