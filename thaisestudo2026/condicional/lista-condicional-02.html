<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 02 | Estrutura Condicional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="page-exercise">
    <main class="exercise-wrap">
        <article class="exercise-card">
            <h1 class="exercise-title">Lista 02 - Estrutura Condicional</h1>
            <p class="exercise-desc">Clique em um exercicio para executar.</p>
            <div class="exercise-actions">
                <button type="button" class="btn-exercise" onclick="exercicio01()">01 - Par ou Impar</button>
                <button type="button" class="btn-exercise" onclick="exercicio02()">02 - Pode dirigir</button>
                <button type="button" class="btn-exercise" onclick="exercicio03()">03 - Boletim escolar</button>
                <button type="button" class="btn-exercise" onclick="exercicio04()">04 - Saudacao por hora</button>
                <button type="button" class="btn-exercise" onclick="exercicio05()">05 - Ano bissexto</button>
                <button type="button" class="btn-exercise" onclick="exercicio06()">06 - IMC</button>
                <button type="button" class="btn-exercise" onclick="exercicio07()">07 - Triangulo</button>
                <button type="button" class="btn-exercise" onclick="exercicio08()">08 - Dia da semana</button>
                <button type="button" class="btn-exercise" onclick="exercicio09()">09 - Calculadora</button>
                <button type="button" class="btn-exercise" onclick="exercicio10()">10 - Sistema de caixa</button>
            </div>
            <div id="resultado" class="exercise-result" role="status" aria-live="polite">
                <span class="exercise-placeholder">Resultado do exercicio aparece aqui.</span>
            </div>
        </article>
    </main>
    <script src="lista-condicional-02.js"></script>
</body>
</html>
